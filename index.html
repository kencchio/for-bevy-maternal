            question: "During phototherapy for hyperbilirubinemia, a nurse notes a grayish-brown discoloration of the infant's skin. This is known as:",

            options: ["10 to 15 cm H2O", "15 to 20 cm H2O", "20 to 30 cm H2O", "40 to 70 cm H2O"],
            answer: 3,
            explanation: "High pressure is required to fill the lungs with air for the first time... between 40 and 70 cm H2O to inspire a first breath."
        },
        {
            question: "Which of the following is an early, subtle sign of Respiratory Distress Syndrome (RDS) in a premature infant?",
            options: ["Tachypnea (more than 60 respirations per minute)", "Pink mucous membranes", "Hyperthermia", "Vigorous crying"],
            answer: 0,
            explanation: "Subtle signs that appear as RDS progresses include low body temperature, nasal flaring, and tachypnea (more than 60 respirations per minute)."
        },
        {
            question: "Following the intratracheal administration of surfactant to a preterm infant, the nurse should ensure they DO NOT:",
            options: ["Change the infant's position", "Assess pulse oximetry", "Suction the endotracheal tube for 1 hour", "Provide supplemental oxygen"],
            answer: 2,
            explanation: "The nurse must not suction the endotracheal tube for 1 hour after administration to avoid removing the drug."
        },
        {
            question: "To ventilate an infant with stiff, noncompliant lungs due to RDS without causing pneumothorax, infant ventilators use a reversed inspiratory/expiratory (I/E) ratio of:",
            options: ["1:2", "2:1", "1:4", "3:1"],
            answer: 1,
            explanation: "Infant ventilators are available with a reversed I/E ratio (2:1) to deliver oxygen to stiff lungs without excessive force."
        },
        {
            question: "In the management of severe hypoxemia in newborns, Nitric Oxide is administered because it acts as a:",
            options: ["Bronchoconstrictor", "Potent pulmonary vascular dilator", "Surfactant substitute", "Red blood cell stimulant"],
            answer: 1,
            explanation: "Nitric oxide is a potent vascular dilator. It causes pulmonary vasodilation without decreasing systemic vascular tone."
        },
        {
            question: "What does ECMO stand for in the context of treating severe neonatal respiratory illnesses?",
            options: ["External Cardiac Monitoring Output", "Extracorporeal Membrane Oxygenation", "Early Continuous Mandatory Oxygen", "Extra Cardiopulmonary Mechanical Oxygenation"],
            answer: 1,
            explanation: "ECMO stands for Extracorporeal Membrane Oxygenation, used for severe hypoxemia in illnesses like meconium aspiration and RDS."
        },
        {
            question: "The primary medical intervention to rest the GI tract in an infant diagnosed with Necrotizing Enterocolitis (NEC) is to:",
            options: ["Provide small, frequent oral milk feeds", "Administer high-dose steroids", "Maintain the infant on IV or total parenteral nutrition (TPN)", "Perform an immediate laparotomy"],
            answer: 2,
            explanation: "The infant is maintained on IV or total parenteral nutrition (TPN) solutions to rest the GI tract."
        },
        {
            question: "A low-birth-weight newborn received prolonged oxygen therapy. A follow-up examination for Retinopathy of Prematurity (ROP) should occur before hospital discharge and again at:",
            options: ["1 to 2 weeks of age", "4 to 6 weeks of age", "3 to 4 months of age", "1 year of age"],
            answer: 1,
            explanation: "The eyes should be examined before discharge and again at age 4 to 6 weeks of age to detect any occurrence of ROP."
        },
        {
            question: "In addition to a supine sleep position, which of the following is recommended by the AAP to reduce the risk of SIDS?",
            options: ["Bed sharing with parents", "Use of a pacifier at sleep times", "Use of soft, plush bedding", "Keeping the room temperature highly elevated"],
            answer: 1,
            explanation: "The AAP recommends putting newborns to sleep on their back and with a pacifier, using a firm sleep surface, and avoiding soft beddings/overheating."
        },
        {
            question: "When counseling parents immediately after the sudden loss of an infant to SIDS, it is normal for the nurse to hear parents:",
            options: ["Blame the medical staff exclusively", "Refuse to speak about the child", "Use both the past and present tense when talking about the child", "Immediately begin planning for another child"],
            answer: 2,
            explanation: "In discussing the child, parents often use both the past and present tense as if they are not yet aware of the death."
        },
        {
            question: "Meconium is expelled into the amniotic fluid in utero primarily due to a vagal reflex stimulated by:",
            options: ["Fetal hyperglycemia", "Maternal dehydration", "Fetal hypoxia", "Uterine hyperstimulation"],
            answer: 2,
            explanation: "If hypoxia occurs, a vagal reflex is stimulated, resulting in relaxation of the rectal sphincter, releasing meconium."
        },
        {
            question: "A therapeutic management technique used during labor to dilute the amount of meconium in amniotic fluid and reduce aspiration risk is:",
            options: ["Amnioinfusion", "Tocolytic administration", "External cephalic version", "Epidural anesthesia"],
            answer: 0,
            explanation: "Amnioinfusion can be used to dilute the amount of meconium in amniotic fluid and reduce the risk of aspiration."
        },
        {
            question: "Which of the following congenital anomalies is an assessment finding commonly associated with Fetal Alcohol Spectrum Disorders (FASD)?",
            options: ["Spina bifida", "Congenital heart disorders", "Cleft palate", "Clubfoot"],
            answer: 1,
            explanation: "Congenital heart disorders are listed as a key assessment finding for FASD, along with facial changes and abnormal palmar creases."
        },
        {
            question: "A high-risk newborn has a temperature of 96.8 F (36.0 C). Which nursing diagnosis is most appropriate?",
            options: ["Ineffective airway clearance", "Ineffective cardiovascular tissue perfusion", "Risk for deficient fluid volume", "Ineffective thermoregulation"],
            answer: 3,
            explanation: "A low temperature points to 'Ineffective thermoregulation related to newborn status and stress from birth weight variation.'"
        }
    ];

    let currentQuizData = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let userAnswers = [];
    let answeredCurrent = false;
    let currentSetName = "";

    document.addEventListener("DOMContentLoaded", function() {
        const menuContainer = document.getElementById('menu-container');
        const quizContainer = document.getElementById('quiz-container');
        const resultsContainer = document.getElementById('results-container');
        const mainSubtitle = document.getElementById('main-subtitle');
        
        const questionTextEl = document.getElementById('question-text');
        const optionsListEl = document.getElementById('options-list');
        const feedbackContainerEl = document.getElementById('feedback-container');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const questionCountEl = document.getElementById('question-count');
        const scoreTrackerEl = document.getElementById('score-tracker');
        const progressFillEl = document.getElementById('progress-fill');
        const finalScoreEl = document.getElementById('final-score');

        // Menu Buttons
        document.getElementById('btn-set-a').addEventListener('click', () => startQuiz(setAData, 'Set A'));
        document.getElementById('btn-set-b').addEventListener('click', () => startQuiz(setBData, 'Set B'));
        document.getElementById('btn-home').addEventListener('click', showMenu);

        function showMenu() {
            menuContainer.style.display = 'flex';
            quizContainer.style.display = 'none';
            resultsContainer.style.display = 'none';
            mainSubtitle.innerText = "Select a knowledge check to begin";
        }

        function startQuiz(dataArray, setName) {
            currentQuizData = dataArray;
            currentSetName = setName;
            currentQuestionIndex = 0;
            score = 0;
            userAnswers = new Array(currentQuizData.length).fill(null);
            
            mainSubtitle.innerText = `${setName} Active`;
            menuContainer.style.display = 'none';
            quizContainer.style.display = 'block';
            resultsContainer.style.display = 'none';
            
            loadQuestion();
        }

        function updateProgress() {
            questionCountEl.innerText = `Question ${currentQuestionIndex + 1} of ${currentQuizData.length}`;
            scoreTrackerEl.innerText = `Score: ${score}`;
            const percent = ((currentQuestionIndex) / currentQuizData.length) * 100;
            progressFillEl.style.width = `${percent}%`;
        }

        function loadQuestion() {
            answeredCurrent = userAnswers[currentQuestionIndex] !== null;
            const currentData = currentQuizData[currentQuestionIndex];
            
            questionTextEl.innerText = `${currentQuestionIndex + 1}. ${currentData.question}`;
            optionsListEl.innerHTML = '';
            feedbackContainerEl.style.display = 'none';
            feedbackContainerEl.className = 'feedback-container';

            currentData.options.forEach((optionText, index) => {
                const li = document.createElement('li');
                li.className = 'option-item';
                li.innerText = optionText;
                
                if (answeredCurrent) {
                    li.classList.add('disabled');
                    if (index === currentData.answer) {
                        li.classList.add('correct');
                    } else if (index === userAnswers[currentQuestionIndex]) {
                        li.classList.add('incorrect');
                    }
                } else {
                    li.onclick = () => selectOption(index, li);
                }
                optionsListEl.appendChild(li);
            });

            btnPrev.disabled = currentQuestionIndex === 0;
            
            if (answeredCurrent) {
                showFeedback(userAnswers[currentQuestionIndex] === currentData.answer, currentData.explanation);
                btnNext.style.display = 'block';
                if (currentQuestionIndex === currentQuizData.length - 1) {
                    btnNext.innerText = 'Finish Quiz';
                } else {
                    btnNext.innerText = 'Next \u2192';
                }
            } else {
                btnNext.style.display = 'none';
            }

            updateProgress();
        }

        function selectOption(selectedIndex, selectedElement) {
            if (answeredCurrent) return;
            answeredCurrent = true;
            userAnswers[currentQuestionIndex] = selectedIndex;
            
            const currentData = currentQuizData[currentQuestionIndex];
            const isCorrect = (selectedIndex === currentData.answer);
            
            if (isCorrect) score++;

            const allOptions = optionsListEl.children;
            for (let i = 0; i < allOptions.length; i++) {
                allOptions[i].classList.add('disabled');
                allOptions[i].onclick = null; 
                
                if (i === currentData.answer) {
                    allOptions[i].classList.add('correct');
                } else if (i === selectedIndex && !isCorrect) {
                    allOptions[i].classList.add('incorrect');
                }
            }

            showFeedback(isCorrect, currentData.explanation);
            scoreTrackerEl.innerText = `Score: ${score}`;

            btnNext.style.display = 'block';
            if (currentQuestionIndex === currentQuizData.length - 1) {
                btnNext.innerText = 'Finish Quiz';
            } else {
                btnNext.innerText = 'Next \u2192';
            }
        }

        function showFeedback(isCorrect, explanation) {
            feedbackContainerEl.style.display = 'block';
            if (isCorrect) {
                feedbackContainerEl.className = 'feedback-container correct-feedback';
                feedbackContainerEl.innerHTML = `<strong>Correct!</strong><br><br>${explanation}`;
            } else {
                feedbackContainerEl.className = 'feedback-container incorrect-feedback';
                feedbackContainerEl.innerHTML = `<strong>Incorrect.</strong><br><br>${explanation}`;
            }
        }

        btnNext.addEventListener('click', () => {
            if (currentQuestionIndex < currentQuizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        });

        btnPrev.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        });

        function showResults() {
            quizContainer.style.display = 'none';
            resultsContainer.style.display = 'block';
            mainSubtitle.innerText = "Results";
            
            const percentage = Math.round((score / currentQuizData.length) * 100);
            finalScoreEl.innerText = `${score} / ${currentQuizData.length} (${percentage}%)`;
        }
    });
</script>

</body>
</html>
